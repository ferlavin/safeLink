services:
  db:
    image: postgres:16-alpine
    container_name: safelink-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: safelink
      POSTGRES_PASSWORD: safelink
      POSTGRES_DB: safelink
    ports:
      - "5432:5432"
    volumes:
      - safelink_pgdata:/var/lib/postgresql/data

volumes:
  safelink_pgdata:
